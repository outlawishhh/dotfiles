#######################################################################################
# Hyprland Configuration
# Properly organized with sections for clarity and maintainability
#######################################################################################

#######################################################################################
# DISPLAY & SCALING
#######################################################################################

monitor=, preferred, auto, 1.25

xwayland {
    force_zero_scaling = true
}

#######################################################################################
# ENVIRONMENT VARIABLES
#######################################################################################

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = XCURSOR_THEME,WinSur-dark-cursors
env = XCURSOR_SIZE,24

#######################################################################################
# INPUT CONFIGURATION
#######################################################################################

input {
    kb_layout = us
    kb_options = grp:win_space_toggle
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = false
    }

    sensitivity = 0
}

#######################################################################################
# GENERAL APPEARANCE
#######################################################################################

general {
    gaps_in = 2
    gaps_out = 3
    border_size = 1
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 13

    blur {
        enabled = false
        size = 3
        passes = 1
    }

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

#######################################################################################
# LAYOUT CONFIGURATION
#######################################################################################

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

#######################################################################################
# MISCELLANEOUS
#######################################################################################

misc {
    disable_hyprland_logo = true
    vfr = true  # Variable Frame Rate for performance
}

#######################################################################################
# STARTUP APPLICATIONS & SERVICES
#######################################################################################

# System services
exec-once = kbuildsycoca6
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = bluetoothctl power off

# Wallpaper
exec-once = ~/.config/hypr/scripts/load_wallpaper.sh

# Status bar
exec-once = hyprpanel

# Clipboard manager
exec-once = copyq &

# Network configuration
exec-once = nmcli connection add type wifi con-name airtel ssid 'name' \
  wifi-sec.key-mgmt wpa-psk wifi-sec.psk 'password' connection.autoconnect yes

# Applications
exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] dolphin
exec-once = [workspace 4 silent] vesktop
exec-once = [workspace 5 silent] spotify
exec-once = [workspace 6 silent] kitty -e nvim
exec-once = qs -c overview

# Audio visualizer
exec-once = [workspace 5 silent] kitty --title cava -e cava

#######################################################################################
# WINDOW RULES
#######################################################################################

# Firefox
windowrulev2 = workspace 2 silent, class:^(firefox)$

# Firefox Picture-in-Picture
windowrulev2 = float, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev2 = pin, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev2 = noborder, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev2 = minsize 200 100, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev2 = maxsize 1920 1080, class:^(firefox)$, title:^(Picture-in-Picture)$

# Dolphin file manager
windowrulev2 = workspace 3 silent, class:^(org.kde.dolphin)$

# Dolphin toolbar popup
windowrulev2 = float, class:^(org.kde.dolphin)$, title:^(Main Toolbar — Dolphin)$
windowrulev2 = move 1020 825, class:^(org.kde.dolphin)$, title:^(Main Toolbar — Dolphin)$
windowrulev2 = size 500 10, class:^(org.kde.dolphin)$, title:^(Main Toolbar — Dolphin)$
windowrulev2 = opacity 0.95, class:^(org.kde.dolphin)$, title:^(Main Toolbar — Dolphin)$

# Vesktop (Discord client)
windowrulev2 = workspace 4 silent, class:^(vesktop)$

# Spotify
windowrulev2 = float, class:^(Spotify)$
windowrulev2 = workspace 5 silent, class:^(Spotify)$
windowrulev2 = move 12 50, class:^(Spotify)$
windowrulev2 = size 1510 600, class:^(Spotify)$

# CAVA audio visualizer
windowrulev2 = float, class:^(kitty)$, title:^(cava)$
windowrulev2 = workspace 5 silent, class:^(kitty)$, title:^(cava)$
windowrulev2 = size 1510 200, class:^(kitty)$, title:^(cava)$
windowrulev2 = move 12 660, class:^(kitty)$, title:^(cava)$

# VSCodium
windowrulev2 = workspace 6 silent, class:^(VSCodium)$

# CopyQ clipboard manager
windowrulev2 = float, class:(com.github.hluk.copyq)
windowrulev2 = size 622 652, class:(com.github.hluk.copyq)

# Lyrics window
windowrulev2 = float, title:^(Lyrics)$
windowrulev2 = pin, title:^(Lyrics)$

#######################################################################################
# KEYBINDINGS
#######################################################################################

$mainMod = SUPER

#==================================================================================
# WINDOW MANAGEMENT
#==================================================================================

# Close active window
bind = $mainMod, Q, killactive

# Toggle split direction
bind = $mainMod, T, togglesplit

# Pin window (keep on top across workspaces)
bind = $mainMod, P, pin

# Fullscreen modes
bind = $mainMod, M, fullscreen, 1  # Maximize (keep bar visible)
bind = $mainMod, F, fullscreen, 2  # Fullscreen (hide bar)
bind = $mainMod SHIFT, F, fullscreenstate, 0 2  # True fullscreen

#==================================================================================
# WINDOW FOCUS
#==================================================================================

# Move focus with SUPER + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#==================================================================================
# WINDOW RESIZING
#==================================================================================

# Resize window with SUPER + ALT + arrow keys
binde = $mainMod ALT, right, resizeactive, 50 0   # Grow width
binde = $mainMod ALT, left, resizeactive, -50 0   # Shrink width
binde = $mainMod ALT, up, resizeactive, 0 -50     # Shrink height
binde = $mainMod ALT, down, resizeactive, 0 50    # Grow height

#==================================================================================
# WINDOW MOVEMENT
#==================================================================================

# Move window with SUPER + SHIFT + arrow keys
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r

#==================================================================================
# WORKSPACE SWITCHING
#==================================================================================

# Switch to workspace with SUPER + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll through workspaces with SUPER + mouse wheel
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

#==================================================================================
# MOVE WINDOW TO WORKSPACE
#==================================================================================

# Move active window to workspace with SUPER + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

#==================================================================================
# MOUSE BINDINGS
#==================================================================================

# Move/resize windows with SUPER + LMB/RMB drag
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#==================================================================================
# APPLICATION LAUNCHERS
#==================================================================================

# Terminal
bind = CTRL ALT, T, exec, [float; move 196 156; size 1200 650] kitty --hold

# Application launchers
bind = $mainMod, R, exec, rofi -show drun -modi drun
bind = $mainMod SHIFT, R, exec, rofi -show run

# Emoji picker
bind = $mainMod, code:60, exec, rofimoji

# Task switcher
bind = Super, TAB, exec, qs ipc -c overview call overview toggle

#==================================================================================
# SCREENSHOTS
#==================================================================================

bind = , Print, exec, /home/byte/.config/hypr/scripts/screenshot-save-copy.sh
bind = $mainMod SHIFT, S, exec, /home/byte/.config/hypr/scripts/screenshot-copy.sh

#==================================================================================
# CLIPBOARD MANAGER
#==================================================================================

bind = $mainMod, V, exec, copyq toggle

#==================================================================================
# SYSTEM CONTROLS
#==================================================================================

# Power menu
bindr = , XF86PowerOff, exec, ~/.config/hypr/scripts/power-launch.sh

# Toggle status bar
bind = $mainMod, W, exec, hyprpanel toggleWindow bar-0

# Wallpaper GUI
bind = CTRL+SHIFT+ALT, W, exec, /home/byte/.config/hypr/scripts/wallpaper_gui.sh

#==================================================================================
# AUDIO CONTROLS
#==================================================================================

# Volume controls
bind = $mainMod, F1, exec, pamixer --toggle-mute; notify-send "Volume: Toggle" -t 1300
bind = $mainMod, F2, exec, pamixer --decrease 5; notify-send "Volume: $(pamixer --get-volume)" -t 1300
bind = $mainMod, F3, exec, pamixer --increase 5; notify-send "Volume: $(pamixer --get-volume)" -t 1300

# Microphone toggle
bind = $mainMod, F4, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle; notify-send "Mic: Toggle" -t 1300

#==================================================================================
# BRIGHTNESS CONTROLS
#==================================================================================

bind = $mainMod, F5, exec, brightnessctl set 5%-; notify-send "Brightness: Down" -t 1300
bind = $mainMod, F6, exec, brightnessctl set +5%; notify-send "Brightness: Up" -t 1300

#######################################################################################
# SUBMAPS
#######################################################################################

# Resize mode 
#bind = $mainMod SHIFT, R, submap, resize
#submap = resize
#bind = ,escape,submap,reset
#submap = reset

#######################################################################################
# END OF CONFIGURATION
#######################################################################################
