# Configuration file for Kitty (using Pywal integration)
allow_remote_control yes

# --- 1. Pywal Colors Include ---
# This line is crucial! It loads the colors generated by running 'wal -i <image>' 
# from your custom template located at ~/.config/wal/templates/kitty.conf
include ~/.cache/wal/kitty.conf

# --- 2. Fonts ---
font_family JetBrainsMono Nerd Font
font_size 12.0

# --- 3. Window & Appearance ---
background_opacity 0.9
dynamic_background_opacity yes
enabled_layouts splits

# --- 4. Color Overrides (Only used if Pywal fails or for manual defaults) ---
# NOTE: The 'include' above will OVERRIDE these if Pywal runs successfully.
# foreground #FFFFFF
# background #000000
# cursor #FFFFFF

# --- 5. Keyboard Shortcuts ---

# Text selection with kitty_grab
map ctrl+a kitten kitty_grab/grab.py

# Copy/Paste
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# Tab management - fix conflicts with grab
map kitty_mod+Left no_op
map kitty_mod+Right no_op

map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# Window splits
map alt+i launch --location=hsplit
map alt+k launch --location=hsplit
map alt+j launch --location=vsplit
map alt+l launch --location=vsplit

# Close split
map alt+q close_window

# Navigate between splits
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down
